<div id="clock-cart" phx-hook="Clock" class="clock-cart">
  <svg viewBox="0 0 24 24" width="64" height="64">

    <circle cx="12" cy="12" r="10"
            fill="none"
            stroke="currentColor"
            stroke-width="2"/>

    <line data-hand="hour"
          x1="12" y1="12" x2="12" y2="7"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"/>

    <line data-hand="minute"
          x1="12" y1="12" x2="12" y2="5"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"/>

    <line data-hand="second"
          x1="12" y1="12" x2="12" y2="4"
          stroke="red"
          stroke-width="1"
          stroke-linecap="round"/>

  </svg>
</div>