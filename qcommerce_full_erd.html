
<style>
#erd { width: 100%; }
#erd svg { width: 100%; height: auto; }
.er-legend { display: flex; gap: 20px; flex-wrap: wrap; margin: 14px 0 4px; font-size: 12px; color: var(--color-text-secondary); }
.er-legend span { display: flex; align-items: center; gap: 6px; }
.er-legend .dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.dot-purple { background: #CECBF6; border: 1.5px solid #534AB7; }
.dot-teal   { background: #9FE1CB; border: 1.5px solid #0F6E56; }
.dot-amber  { background: #FAC775; border: 1.5px solid #854F0B; }
.dot-coral  { background: #F5C4B3; border: 1.5px solid #993C1D; }
.dot-gray   { background: #D3D1C7; border: 1.5px solid #5F5E5A; }
</style>
<div class="er-legend">
  <span><span class="dot dot-purple"></span>Identity & access</span>
  <span><span class="dot dot-teal"></span>Catalog & inventory</span>
  <span><span class="dot dot-amber"></span>Orders & delivery</span>
  <span><span class="dot dot-coral"></span>Financial ledger</span>
  <span><span class="dot dot-gray"></span>Platform config</span>
</div>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryBorderColor: dark ? '#AFA9EC' : '#534AB7',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
  },
});

const diagram = `erDiagram
  users {
    uuid id PK
    text email UK
    text phone UK
    text full_name
    text password_hash
    text role
    bool is_active
    timestamptz inserted_at
    timestamptz updated_at
  }
  addresses {
    uuid id PK
    uuid user_id FK
    text label
    text line1
    text line2
    text city
    geography location
    bool is_default
    timestamptz inserted_at
  }
  branches {
    uuid id PK
    text code UK
    text name
    geography location
    int catchment_radius_m
    bool is_active
    timestamptz inserted_at
    timestamptz updated_at
  }
  fiscal_years {
    uuid id PK
    text label UK
    date start_date
    date end_date
    bool is_closed
    timestamptz inserted_at
  }
  categories {
    uuid id PK
    uuid parent_id FK
    text name
    text slug UK
    int sort_order
    timestamptz inserted_at
  }
  products {
    uuid id PK
    uuid category_id FK
    text name
    text sku UK
    text description
    numeric base_price
    text unit
    bool is_active
    timestamptz inserted_at
    timestamptz updated_at
  }
  branch_inventory {
    uuid id PK
    uuid branch_id FK
    uuid product_id FK
    int quantity_on_hand
    int reorder_threshold
    numeric selling_price
    bool is_available
    timestamptz updated_at
  }
  riders {
    uuid id PK
    uuid user_id FK
    text vehicle_type
    text license_number
    text status
    geography current_location
    timestamptz location_updated_at
    timestamptz inserted_at
  }
  orders {
    uuid id PK
    uuid user_id FK
    uuid branch_id FK
    uuid address_id FK
    uuid rider_id FK
    text status
    numeric subtotal
    numeric delivery_fee
    numeric tax_amount
    numeric total_amount
    text cancellation_reason
    timestamptz placed_at
    timestamptz confirmed_at
    timestamptz delivered_at
    timestamptz updated_at
  }
  order_items {
    uuid id PK
    uuid order_id FK
    uuid product_id FK
    int quantity
    numeric unit_price
    numeric line_total
    text status
  }
  outbox_events {
    uuid id PK
    uuid idempotency_key UK
    text aggregate_type
    uuid aggregate_id
    text event_type
    jsonb payload
    text status
    int attempts
    timestamptz inserted_at
    timestamptz processed_at
  }
  accounts {
    uuid id PK
    uuid parent_id FK
    text code UK
    text name
    text account_type
    text normal_balance
    int shard_count
    bool is_active
    timestamptz inserted_at
  }
  journals {
    uuid id PK
    uuid branch_id FK
    uuid fiscal_year_id FK
    uuid idempotency_key UK
    text description
    uuid outbox_event_id FK
    timestamptz posted_at
    timestamptz inserted_at
  }
  journal_lines {
    uuid id PK
    uuid journal_id FK
    uuid branch_id FK
    uuid fiscal_year_id FK
    uuid account_id FK
    numeric amount
    text entry_type
    int shard_id
    uuid idempotency_key UK
    timestamptz posted_at
    timestamptz inserted_at
  }
  balance_checkpoints {
    uuid id PK
    uuid branch_id FK
    uuid account_id FK
    uuid fiscal_year_id FK
    int shard_id
    numeric debit_total
    numeric credit_total
    timestamptz checkpointed_through
    int entry_count
    timestamptz inserted_at
  }

  users       ||--o{ addresses       : "has"
  users       ||--o{ orders          : "places"
  users       ||--o|  riders         : "is"
  branches    ||--o{ branch_inventory: "stocks"
  branches    ||--o{ orders          : "fulfils"
  branches    ||--o{ journals        : "owns"
  products    ||--o{ branch_inventory: "in"
  products    ||--o{ order_items     : "contains"
  categories  ||--o{ products        : "groups"
  categories  ||--o{ categories      : "nests"
  orders      ||--o{ order_items     : "has"
  orders      ||--o{ outbox_events   : "emits"
  orders      }o--|| addresses       : "delivers to"
  riders      ||--o{ orders          : "delivers"
  journals    ||--o{ journal_lines   : "has"
  journals    }o--|| fiscal_years    : "in"
  fiscal_years||--o{ balance_checkpoints: "scopes"
  accounts    ||--o{ journal_lines   : "debited/credited"
  accounts    ||--o{ balance_checkpoints: "tracked in"
  accounts    ||--o{ accounts        : "parent"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke','none');
});
</script>
